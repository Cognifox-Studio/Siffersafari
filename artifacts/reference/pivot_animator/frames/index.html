<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pivot GIF Frames</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Georgia, "Times New Roman", serif;
      background: #ebe8de;
      color: #2d241e;
    }

    h1 {
      margin: 0 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    figure {
      margin: 0;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    img {
      width: 100%;
      display: block;
      background: #dcdcdc;
      border-radius: 10px;
    }

    figcaption {
      margin-top: 8px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <h1>Pivot GIF Frames</h1>
  <div class="grid">
    <figure><img src="frame_000.png" alt="Frame 0"><figcaption>Frame 0</figcaption></figure>
    <figure><img src="frame_001.png" alt="Frame 1"><figcaption>Frame 1</figcaption></figure>
    <figure><img src="frame_002.png" alt="Frame 2"><figcaption>Frame 2</figcaption></figure>
    <figure><img src="frame_003.png" alt="Frame 3"><figcaption>Frame 3</figcaption></figure>
    <figure><img src="frame_004.png" alt="Frame 4"><figcaption>Frame 4</figcaption></figure>
    <figure><img src="frame_005.png" alt="Frame 5"><figcaption>Frame 5</figcaption></figure>
    <figure><img src="frame_006.png" alt="Frame 6"><figcaption>Frame 6</figcaption></figure>
    <figure><img src="frame_007.png" alt="Frame 7"><figcaption>Frame 7</figcaption></figure>
    <figure><img src="frame_008.png" alt="Frame 8"><figcaption>Frame 8</figcaption></figure>
    <figure><img src="frame_009.png" alt="Frame 9"><figcaption>Frame 9</figcaption></figure>
    <figure><img src="frame_010.png" alt="Frame 10"><figcaption>Frame 10</figcaption></figure>
    <figure><img src="frame_011.png" alt="Frame 11"><figcaption>Frame 11</figcaption></figure>
    <figure><img src="frame_012.png" alt="Frame 12"><figcaption>Frame 12</figcaption></figure>
    <figure><img src="frame_013.png" alt="Frame 13"><figcaption>Frame 13</figcaption></figure>
  </div>
</body>
</html>
