<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skogshjalte Walk Preview</title>
  <style>
    :root {
      --sky-top: #f8f0c9;
      --sky-bottom: #9ddac9;
      --track: #d7bd7e;
      --card: rgba(255, 252, 243, 0.82);
      --ink: #3f2d24;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.55), transparent 24%),
        radial-gradient(circle at 80% 12%, rgba(255, 248, 209, 0.7), transparent 20%),
        linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      overflow: hidden;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
      max-width: 380px;
      padding: 16px 18px;
      border: 2px solid rgba(63, 45, 36, 0.15);
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(73, 57, 26, 0.14);
    }

    .hud h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
    }

    .hud p {
      margin: 0;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .hud-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .hud button {
      border: 1px solid rgba(63, 45, 36, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      padding: 7px 11px;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .hud button:hover {
      transform: translateY(-1px);
      border-color: rgba(63, 45, 36, 0.32);
    }

    .hud button.is-active {
      background: rgba(78, 159, 90, 0.18);
      border-color: rgba(47, 122, 58, 0.42);
    }

    .hud-status {
      margin-top: 10px;
      font-size: 0.82rem;
      color: rgba(63, 45, 36, 0.78);
    }

    .stage {
      position: relative;
      width: min(92vw, 760px);
      aspect-ratio: 19 / 12;
      border-radius: 28px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 32%),
        linear-gradient(180deg, rgba(255, 253, 247, 0.26), rgba(255, 236, 176, 0.08));
      box-shadow: 0 22px 60px rgba(62, 53, 20, 0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .sun {
      position: absolute;
      top: 28px;
      right: 44px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #fff9dd, #ffd76c 68%, #f1ba43 100%);
      box-shadow: 0 0 50px rgba(255, 211, 94, 0.55);
    }

    .hill {
      position: absolute;
      bottom: 112px;
      background: #77c46d;
      border-radius: 50%;
      opacity: 0.95;
    }

    .hill.a {
      left: -40px;
      width: 320px;
      height: 120px;
    }

    .hill.b {
      right: -30px;
      width: 360px;
      height: 136px;
      background: #6bb961;
    }

    .track {
      position: absolute;
      left: -10%;
      bottom: 0;
      width: 120%;
      height: 148px;
      background:
        linear-gradient(180deg, #ead296, var(--track)),
        linear-gradient(90deg, transparent 0 12%, rgba(255,255,255,0.08) 12% 14%, transparent 14% 100%);
      border-top-left-radius: 52% 40px;
      border-top-right-radius: 52% 40px;
    }

    .track::before {
      content: "";
      position: absolute;
      inset: 42px -25% 58px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0 48px,
        rgba(126, 96, 43, 0.5) 48px 62px,
        transparent 62px 118px
      );
      animation: trackMove 1s linear infinite;
      opacity: 0.38;
    }

    .character-wrap {
      position: absolute;
      left: 50%;
      bottom: 10px;
      width: 360px;
      height: 520px;
      transform: translateX(-50%);
      display: grid;
      place-items: end center;
    }

    svg {
      overflow: visible;
    }

    #pelvis-group,
    #chest-group,
    #neck-group,
    #cape,
    #hat,
    #arm-left-rig,
    #arm-right-rig,
    #leg-left-rig,
    #leg-right-rig,
    #shoulder-left,
    #shoulder-right,
    #arm-left-upper,
    #arm-left-lower,
    #arm-right-upper,
    #arm-right-lower,
    #wrist-left,
    #wrist-right,
    #hip-left,
    #hip-right,
    #leg-left-upper,
    #leg-left-lower,
    #leg-right-upper,
    #leg-right-lower,
    #ankle-left,
    #ankle-right,
    #foot-left,
    #foot-right,
    #toe-left,
    #toe-right,
    #head-group,

      transform-box: fill-box;
    }

    #character {
      animation: bodyBob 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 50% 84%;
    }

    #arm-left-rig,
    #leg-left-rig {
      opacity: 0.9;
    }

    #arm-right-rig,
    #leg-right-rig {
      opacity: 1;
    }

    #shadow {
      animation: shadowPulse 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center;
    }

    #pelvis-group {
      animation: pelvisDrive 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 50% 66%;
    }

    #chest-group {

      transform-origin: 50% 35%;
    }

    #neck-group {

    }

    #hat {

      transform-origin: 50% 92%;
    }

    #shoulder-left {

    #arm-left-lower {

    #arm-right-upper {
      animation: armUpperRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;

    #arm-right-lower {
      animation: armLowerRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;

    }

    #wrist-left {
      animation: wristLeft 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 48% 10%;
    }

    #wrist-right {
      animation: wristRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 52% 10%;
    }

    #hip-left {
      animation: hipLeft 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 66% 10%;
    }

    #hip-right {
      animation: hipRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 34% 10%;
    }

    #leg-left-upper {
      animation: legUpperLeft 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 56% 7%;
    }

    #leg-left-lower {
      animation: legLowerLeft 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 48% 7%;
    }

    #leg-right-upper {
      animation: legUpperRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 44% 7%;
    }

    #leg-right-lower {
      animation: legLowerRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 52% 7%;
    }

    #ankle-left {
      animation: ankleLeft 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 50% 12%;
    }

    #ankle-right {
      animation: ankleRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 50% 12%;
    }

    #foot-left {
      animation: footLeft 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 24% 32%;
    }

    #foot-right {
      animation: footRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 24% 32%;
    }

    #toe-left {
      animation: toeLeft 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 8% 56%;
    }

    #toe-right {
      animation: toeRight 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 8% 56%;
    }

    #head-group {
      animation: headBob 1.16s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 50% 78%;
    }

    #eyes-open {
      animation: blinkOpen 4s linear infinite;
    }

    #eyes-blink {
      opacity: 0;
      animation: blinkClosed 4s linear infinite;
    }

    .pose-review .track::before,
    .pose-review #character,
    .pose-review #shadow,
    .pose-review #pelvis-group,
    .pose-review #chest-group,
    .pose-review #neck-group,

    .pose-review #head-group,
    .pose-review #eyes-open,
    .pose-review #eyes-blink {
      animation: none !important;
    }

    .pose-review #eyes-open {
      opacity: 1;
    }

    .pose-review #eyes-blink {
      opacity: 0;
    }

    .pose-review #shadow {
      opacity: 0.2;
    }

    .pose-contact-right #character {
      transform: translateX(-2px) translateY(1px);
    }

    .pose-contact-right #shadow {
      transform: scaleX(1.06) scaleY(0.99);

    }

    @keyframes trackMove {
      from { transform: translateX(0); }
      to { transform: translateX(-118px); }

    @keyframes bodyBob {
      0%, 100% { transform: translateX(-2px) translateY(1px); }
      12.5% { transform: translateX(-1px) translateY(1px); }
      25% { transform: translateX(0) translateY(-1px); }
      37.5% { transform: translateX(1px) translateY(-2px); }
      50% { transform: translateX(2px) translateY(1px); }
      62.5% { transform: translateX(1px) translateY(1px); }
      75% { transform: translateX(0) translateY(-1px); }

    @keyframes shadowPulse {

    @keyframes chestCounter {

      62.5% { transform: translateX(1px) rotate(0.6deg); }
      75% { transform: translateX(-1px) rotate(-0.8deg); }
      87.5% { transform: translateX(-1px) rotate(-1.5deg); }
    }

      37.5% { transform: translateX(1px) rotate(-0.8deg); }

  <script>
    const poseButtons = Array.from(document.querySelectorAll('[data-pose]'));
    const poseStatus = document.getElementById('pose-status');
    const poseClasses = [
      'pose-review',
      'pose-contact-right',
      'pose-passing-right',
      'pose-contact-left',
      'pose-passing-left',
    ];

    const poseLabels = {
      live: 'Lage: live-loop',
      'contact-right': 'Lage: kontakt hoger',
      'passing-right': 'Lage: passing hoger',
      'contact-left': 'Lage: kontakt vanster',
      'passing-left': 'Lage: passing vanster',
    };

    const poseClassMap = {
      'contact-right': 'pose-contact-right',
      'passing-right': 'pose-passing-right',
      'contact-left': 'pose-contact-left',
      'passing-left': 'pose-passing-left',
    };

    function applyPose(pose) {
      document.body.classList.remove(...poseClasses);

      if (pose !== 'live') {
        document.body.classList.add('pose-review', poseClassMap[pose]);
      }

      poseButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.pose === pose);
      });

      poseStatus.textContent = poseLabels[pose];
    }

    poseButtons.forEach((button) => {
      button.addEventListener('click', () => applyPose(button.dataset.pose));
    });
  </script>
