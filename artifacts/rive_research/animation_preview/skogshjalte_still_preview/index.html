<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skogshjalte Pose Preview</title>
  <style>
    :root {
      --sky-top: #f8f0c9;
      --sky-bottom: #9ddac9;
      --grass: #4eab62;
      --track: #d7bd7e;
      --track-line: #b99757;
      --card: rgba(255, 252, 243, 0.82);
      --ink: #3f2d24;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.55), transparent 24%),
        radial-gradient(circle at 80% 12%, rgba(255, 248, 209, 0.7), transparent 20%),
        linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      overflow: hidden;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
      max-width: 360px;
      padding: 16px 18px;
      border: 2px solid rgba(63, 45, 36, 0.15);
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(73, 57, 26, 0.14);
    }

    .hud h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
    }

    .hud p {
      margin: 0;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .stage {
      position: relative;
      width: min(92vw, 760px);
      aspect-ratio: 19 / 12;
      border-radius: 28px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 32%),
        linear-gradient(180deg, rgba(255, 253, 247, 0.26), rgba(255, 236, 176, 0.08));
      box-shadow: 0 22px 60px rgba(62, 53, 20, 0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .sun {
      position: absolute;
      top: 28px;
      right: 44px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #fff9dd, #ffd76c 68%, #f1ba43 100%);
      box-shadow: 0 0 50px rgba(255, 211, 94, 0.55);
    }

    .hill {
      position: absolute;
      bottom: 112px;
      background: #77c46d;
      border-radius: 50%;
      opacity: 0.95;
    }

    .hill.a {
      left: -40px;
      width: 320px;
      height: 120px;
    }

    .hill.b {
      right: -30px;
      width: 360px;
      height: 136px;
      background: #6bb961;
    }

    .track {
      position: absolute;
      left: -10%;
      bottom: 0;
      width: 120%;
      height: 148px;
      background:
        linear-gradient(180deg, #ead296, var(--track)),
        linear-gradient(90deg, transparent 0 12%, rgba(255,255,255,0.08) 12% 14%, transparent 14% 100%);
      border-top-left-radius: 52% 40px;
      border-top-right-radius: 52% 40px;
    }

    .track::before {
      content: "";
      position: absolute;
      inset: 42px -25% 58px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0 48px,
        rgba(126, 96, 43, 0.5) 48px 62px,
        transparent 62px 118px
      );
      animation: trackMove 1s linear infinite;
      opacity: 0.38;
    }

    .character-wrap {
      position: absolute;
      left: 0;
      bottom: 10px;
      width: 360px;
      height: 520px;
      transform: translateX(0);
      display: grid;
      place-items: end center;
      animation: walkAcrossStage 8.8s linear infinite;
    }

    svg {
      overflow: visible;
    }

    #pelvis-group,
    #chest-group,
    #neck-group,
    #shoulder-left,
    #shoulder-right,
    #arm-left-upper,
    #arm-left-lower,
    #arm-right-upper,
    #arm-right-lower,
    #wrist-left,
    #wrist-right,
    #hip-left,
    #hip-right,
    #leg-left-upper,
    #leg-left-lower,
    #leg-right-upper,
    #leg-right-lower,
    #ankle-left,
    #ankle-right,
    #foot-left,
    #foot-right,
    #toe-left,
    #toe-right,
    #head-group,
    #shadow {
      transform-box: fill-box;
    }

    #character {
        animation: bodyBob 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 50% 84%;
    }

    #shadow {
        animation: shadowPulse 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center;
    }

    #pelvis-group {
        animation: pelvisBob 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center 78%;
    }

    #chest-group {
        animation: chestCounter 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center 45%;
    }

    #neck-group {
        animation: neckFollow 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center 60%;
    }

    #shoulder-left,
    #shoulder-right,
    #hip-left,
    #hip-right {
      transform-origin: center top;
    }

    #wrist-left,
    #wrist-right,
    #ankle-left,
    #ankle-right,
    #toe-left,
    #toe-right {
      transform-origin: center top;
    }


    #arm-left-upper {
        animation: armUpperLeft 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #arm-left-lower {
        animation: armLowerLeft 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #arm-right-upper {
        animation: armUpperRight 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #arm-right-lower {
        animation: armLowerRight 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #leg-left-upper {
        animation: legUpperLeft 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #leg-left-lower {
        animation: legLowerLeft 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #leg-right-upper {
        animation: legUpperRight 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #leg-right-lower {
        animation: legLowerRight 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #foot-left {
        animation: footLeft 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: 24% 32%;
    }

    #foot-right {
        animation: footRight 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center top;
    }

    #head-group {
        animation: headBob 1.18s cubic-bezier(0.42, 0, 0.28, 1) infinite;
      transform-origin: center center;
    }

    #eyes-open {
      animation: blinkOpen 4s linear infinite;
    }

    #eyes-blink {
      opacity: 0;
      animation: blinkClosed 4s linear infinite;
    }

    .tpose-preview .track::before,
    .tpose-preview #character,
    .tpose-preview #shadow,
    .tpose-preview #pelvis-group,
    .tpose-preview #chest-group,
    .tpose-preview #neck-group,
    .tpose-preview #shoulder-left,
    .tpose-preview #shoulder-right,
    .tpose-preview #arm-left-upper,
    .tpose-preview #arm-left-lower,
    .tpose-preview #arm-right-upper,
    .tpose-preview #arm-right-lower,
    .tpose-preview #wrist-left,
    .tpose-preview #wrist-right,
    .tpose-preview #hip-left,
    .tpose-preview #hip-right,
    .tpose-preview #leg-left-upper,
    .tpose-preview #leg-left-lower,
    .tpose-preview #leg-right-upper,
    .tpose-preview #leg-right-lower,
    .tpose-preview #ankle-left,
    .tpose-preview #ankle-right,
    .tpose-preview #foot-left,
    .tpose-preview #foot-right,
    .tpose-preview #toe-left,
    .tpose-preview #toe-right,
    .tpose-preview #head-group,
    .tpose-preview #eyes-open,
    .tpose-preview #eyes-blink {
      animation: none !important;
    }

    .tpose-preview #arm-left-upper {
      transform: translateY(17px) rotate(90deg);
    }

    .tpose-preview #arm-left-lower {
      transform: translateY(-2px) rotate(0deg);
    }

    .tpose-preview #arm-right-upper {
      transform: translateY(16px) rotate(-90deg);
    }

    .tpose-preview #arm-right-lower {
      transform: translateY(-2px) rotate(0deg);
    }

    .tpose-preview #leg-left-upper,
    .tpose-preview #leg-right-upper,
    .tpose-preview #leg-left-lower,
    .tpose-preview #leg-right-lower,
    .tpose-preview #head-group {
      transform: none;
    }

    .tpose-preview #foot-left,
    .tpose-preview #foot-right {
      transform: translateX(0) rotate(0deg);
    }

    .tpose-preview #eyes-open {
      opacity: 1;
    }

    .tpose-preview #eyes-blink {
      opacity: 0;
    }

    .pivot-wave-preview .track::before,
    .pivot-wave-preview .character-wrap,
    .pivot-wave-preview #character,
    .pivot-wave-preview #shadow,
    .pivot-wave-preview #head-group {
      animation: none !important;
    }

    .pivot-wave-preview .character-wrap {
      left: calc(50% - 180px);
      bottom: 10px;
    }

    .pivot-wave-preview #pelvis-group {
      animation: pivotPelvisWave 1.08s linear infinite !important;
    }

    .pivot-wave-preview #chest-group {
      animation: pivotChestCounter 1.08s linear infinite !important;
    }

    .pivot-wave-preview #neck-group {
      animation: pivotNeckFollow 1.08s linear infinite !important;
    }

    .pivot-wave-preview #shoulder-left {
      animation: pivotShoulderLeftSettle 1.08s linear infinite !important;
    }

    .pivot-wave-preview #shoulder-right {
      animation: pivotShoulderRightWave 1.08s linear infinite !important;
    }

    .pivot-wave-preview #arm-left-upper {
      animation: none !important;
      transform: rotate(5deg);
    }

    .pivot-wave-preview #arm-left-lower {
      animation: none !important;
      transform: rotate(2deg);
    }

    .pivot-wave-preview #arm-right-upper {
      animation: pivotWaveUpperRight 1.08s linear infinite !important;
    }

    .pivot-wave-preview #arm-right-lower {
      animation: pivotWaveLowerRight 1.08s linear infinite !important;
    }

    .pivot-wave-preview #wrist-left {
      animation: pivotWristLeftSettle 1.08s linear infinite !important;
    }

    .pivot-wave-preview #wrist-right {
      animation: pivotWristRightWave 1.08s linear infinite !important;
    }

    .pivot-wave-preview #hip-left {
      animation: pivotHipLeftSettle 1.08s linear infinite !important;
    }

    .pivot-wave-preview #hip-right {
      animation: pivotHipRightSettle 1.08s linear infinite !important;
    }

    .pivot-wave-preview #ankle-left {
      animation: pivotAnkleLeftSettle 1.08s linear infinite !important;
    }

    .pivot-wave-preview #ankle-right {
      animation: pivotAnkleRightSettle 1.08s linear infinite !important;
    }

    .pivot-wave-preview #toe-left {
      animation: pivotToeLeftSettle 1.08s linear infinite !important;
    }

    .pivot-wave-preview #toe-right {
      animation: pivotToeRightSettle 1.08s linear infinite !important;
    }

    @keyframes trackMove {
      from { transform: translateX(0); }
      to { transform: translateX(-118px); }
    }

    @keyframes walkAcrossStage {
      from { left: 0; }
      to { left: calc(100% - 360px); }
    }

    @keyframes bodyBob {
      0%, 100% { transform: translateX(-1px) translateY(1px); }
      12.5% { transform: translateX(-1px) translateY(2px); }
      25% { transform: translateX(0px) translateY(0px); }
      37.5% { transform: translateX(1px) translateY(-2px); }
      50% { transform: translateX(1px) translateY(1px); }
      62.5% { transform: translateX(1px) translateY(2px); }
      75% { transform: translateX(0px) translateY(0px); }
      87.5% { transform: translateX(-1px) translateY(-2px); }
    }

    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1.04) scaleY(0.98); opacity: 0.20; }
      12.5% { transform: scaleX(1.06) scaleY(0.99); opacity: 0.22; }
      25% { transform: scaleX(0.95) scaleY(0.89); opacity: 0.14; }
      37.5% { transform: scaleX(0.90) scaleY(0.84); opacity: 0.11; }
      50% { transform: scaleX(1.04) scaleY(0.98); opacity: 0.20; }
      62.5% { transform: scaleX(1.06) scaleY(0.99); opacity: 0.22; }
      75% { transform: scaleX(0.95) scaleY(0.89); opacity: 0.14; }
      87.5% { transform: scaleX(0.90) scaleY(0.84); opacity: 0.11; }
    }

    @keyframes pelvisBob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-1px); }
    }

    @keyframes chestCounter {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-0.6deg); }
    }

    @keyframes neckFollow {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(0.6deg); }
    }

    @keyframes armUpperLeft {
      0%, 100% { transform: rotate(12deg); }
      12.5% { transform: rotate(8deg); }
      25% { transform: rotate(2deg); }
      37.5% { transform: rotate(-6deg); }
      50% { transform: rotate(-12deg); }
      62.5% { transform: rotate(-6deg); }
      75% { transform: rotate(0deg); }
      87.5% { transform: rotate(7deg); }
    }

    @keyframes armLowerLeft {
      0%, 100% { transform: rotate(10deg); }
      12.5% { transform: rotate(8deg); }
      25% { transform: rotate(4deg); }
      37.5% { transform: rotate(0deg); }
      50% { transform: rotate(-4deg); }
      62.5% { transform: rotate(-1deg); }
      75% { transform: rotate(3deg); }
      87.5% { transform: rotate(7deg); }
    }

    @keyframes armUpperRight {
      0%, 100% { transform: rotate(-12deg); }
      12.5% { transform: rotate(-6deg); }
      25% { transform: rotate(0deg); }
      37.5% { transform: rotate(7deg); }
      50% { transform: rotate(12deg); }
      62.5% { transform: rotate(8deg); }
      75% { transform: rotate(2deg); }
      87.5% { transform: rotate(-6deg); }
    }

    @keyframes armLowerRight {
      0%, 100% { transform: rotate(-4deg); }
      12.5% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      37.5% { transform: rotate(7deg); }
      50% { transform: rotate(10deg); }
      62.5% { transform: rotate(8deg); }
      75% { transform: rotate(4deg); }
      87.5% { transform: rotate(0deg); }
    }

    @keyframes legUpperLeft {
      0%, 100% { transform: translateX(-3px) rotate(-10deg) translateY(0); }
      12.5% { transform: translateX(-3px) rotate(-6deg) translateY(1px); }
      25% { transform: translateX(-3px) rotate(0deg) translateY(2px); }
      37.5% { transform: translateX(-2px) rotate(8deg) translateY(3px); }
      50% { transform: translateX(-2px) rotate(12deg) translateY(4px); }
      62.5% { transform: translateX(-2px) rotate(8deg) translateY(3px); }
      75% { transform: translateX(-3px) rotate(0deg) translateY(2px); }
      87.5% { transform: translateX(-3px) rotate(-6deg) translateY(1px); }
    }

    @keyframes legLowerLeft {
      0%, 100% { transform: translateX(-2px) rotate(12deg); }
      12.5% { transform: translateX(-2px) rotate(16deg); }
      25% { transform: translateX(-2px) rotate(24deg); }
      37.5% { transform: translateX(-1px) rotate(30deg); }
      50% { transform: translateX(-1px) rotate(12deg); }
      62.5% { transform: translateX(-1px) rotate(16deg); }
      75% { transform: translateX(-2px) rotate(24deg); }
      87.5% { transform: translateX(-2px) rotate(30deg); }
    }

    @keyframes legUpperRight {
      0%, 100% { transform: translateX(2px) rotate(12deg) translateY(4px); }
      12.5% { transform: translateX(2px) rotate(8deg) translateY(3px); }
      25% { transform: translateX(3px) rotate(0deg) translateY(2px); }
      37.5% { transform: translateX(3px) rotate(-6deg) translateY(1px); }
      50% { transform: translateX(3px) rotate(-10deg) translateY(0); }
      62.5% { transform: translateX(3px) rotate(-6deg) translateY(1px); }
      75% { transform: translateX(3px) rotate(0deg) translateY(2px); }
      87.5% { transform: translateX(2px) rotate(8deg) translateY(3px); }
    }

    @keyframes legLowerRight {
      0%, 100% { transform: translateX(1px) rotate(12deg); }
      12.5% { transform: translateX(1px) rotate(16deg); }
      25% { transform: translateX(2px) rotate(24deg); }
      37.5% { transform: translateX(2px) rotate(30deg); }
      50% { transform: translateX(2px) rotate(12deg); }
      62.5% { transform: translateX(2px) rotate(16deg); }
      75% { transform: translateX(2px) rotate(24deg); }
      87.5% { transform: translateX(1px) rotate(30deg); }
    }

    @keyframes footLeft {
      0%, 100% { transform: translateX(-3px) rotate(5deg); }
      12.5% { transform: translateX(-2px) rotate(3deg); }
      25% { transform: translateX(-1px) rotate(0deg); }
      37.5% { transform: translateX(0px) rotate(-3deg); }
      50% { transform: translateX(1px) rotate(-5deg); }
      62.5% { transform: translateX(0px) rotate(-2deg); }
      75% { transform: translateX(-1px) rotate(0deg); }
      87.5% { transform: translateX(-2px) rotate(3deg); }
    }

    @keyframes footRight {
      0%, 100% { transform: translateX(1px) rotate(-5deg); }
      12.5% { transform: translateX(0px) rotate(-2deg); }
      25% { transform: translateX(-1px) rotate(0deg); }
      37.5% { transform: translateX(-2px) rotate(3deg); }
      50% { transform: translateX(-3px) rotate(5deg); }
      62.5% { transform: translateX(-2px) rotate(3deg); }
      75% { transform: translateX(-1px) rotate(0deg); }
      87.5% { transform: translateX(0px) rotate(-3deg); }
    }

    @keyframes pivotWaveUpperRight {
      0% { transform: rotate(-8deg); }
      7% { transform: rotate(-16deg); }
      14% { transform: rotate(-26deg); }
      21% { transform: rotate(-38deg); }
      29% { transform: rotate(-50deg); }
      36% { transform: rotate(-60deg); }
      43% { transform: rotate(-68deg); }
      50% { transform: rotate(-62deg); }
      57% { transform: rotate(-52deg); }
      64% { transform: rotate(-40deg); }
      71% { transform: rotate(-28deg); }
      79% { transform: rotate(-18deg); }
      86% { transform: rotate(-10deg); }
      93% { transform: rotate(-6deg); }
      100% { transform: rotate(-8deg); }
    }

    @keyframes pivotWaveLowerRight {
      0% { transform: rotate(-2deg); }
      7% { transform: rotate(2deg); }
      14% { transform: rotate(8deg); }
      21% { transform: rotate(14deg); }
      29% { transform: rotate(22deg); }
      36% { transform: rotate(30deg); }
      43% { transform: rotate(34deg); }
      50% { transform: rotate(34deg); }
      57% { transform: rotate(30deg); }
      64% { transform: rotate(22deg); }
      71% { transform: rotate(14deg); }
      79% { transform: rotate(8deg); }
      86% { transform: rotate(2deg); }
      93% { transform: rotate(-1deg); }
      100% { transform: rotate(-2deg); }
    }

    @keyframes pivotPelvisWave {
      0% { transform: translateY(0px) rotate(0deg); }
      21% { transform: translateY(-1px) rotate(-0.6deg); }
      43% { transform: translateY(-2px) rotate(-1deg); }
      64% { transform: translateY(-1px) rotate(-0.3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @keyframes pivotChestCounter {
      0% { transform: rotate(0deg); }
      21% { transform: rotate(1deg); }
      43% { transform: rotate(1.6deg); }
      64% { transform: rotate(1deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pivotNeckFollow {
      0% { transform: rotate(0deg); }
      21% { transform: rotate(-0.8deg); }
      43% { transform: rotate(-1.4deg); }
      64% { transform: rotate(-0.8deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pivotShoulderLeftSettle {
      0%, 100% { transform: rotate(0deg); }
      43% { transform: rotate(1deg); }
      64% { transform: rotate(0.4deg); }
    }

    @keyframes pivotShoulderRightWave {
      0% { transform: rotate(0deg); }
      7% { transform: rotate(-4deg); }
      21% { transform: rotate(-8deg); }
      43% { transform: rotate(-10deg); }
      64% { transform: rotate(-6deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pivotWristLeftSettle {
      0%, 100% { transform: rotate(0deg); }
      43% { transform: rotate(2deg); }
      64% { transform: rotate(1deg); }
    }

    @keyframes pivotWristRightWave {
      0% { transform: rotate(0deg); }
      14% { transform: rotate(6deg); }
      36% { transform: rotate(14deg); }
      50% { transform: rotate(18deg); }
      71% { transform: rotate(8deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pivotHipLeftSettle {
      0%, 100% { transform: rotate(0deg); }
      43% { transform: rotate(1deg); }
      64% { transform: rotate(0.4deg); }
    }

    @keyframes pivotHipRightSettle {
      0%, 100% { transform: rotate(0deg); }
      21% { transform: rotate(-0.6deg); }
      43% { transform: rotate(-1deg); }
      64% { transform: rotate(-0.4deg); }
    }

    @keyframes pivotAnkleLeftSettle {
      0%, 100% { transform: rotate(0deg); }
      43% { transform: rotate(2deg); }
      64% { transform: rotate(1deg); }
    }

    @keyframes pivotAnkleRightSettle {
      0%, 100% { transform: rotate(0deg); }
      21% { transform: rotate(-1deg); }
      43% { transform: rotate(-2deg); }
      64% { transform: rotate(-1deg); }
    }

    @keyframes pivotToeLeftSettle {
      0%, 100% { transform: rotate(0deg); }
      43% { transform: rotate(3deg); }
      64% { transform: rotate(1deg); }
    }

    @keyframes pivotToeRightSettle {
      0%, 100% { transform: rotate(0deg); }
      21% { transform: rotate(-2deg); }
      43% { transform: rotate(-4deg); }
      64% { transform: rotate(-2deg); }
    }

    @keyframes headBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(-0.5deg); }
    }

    @keyframes blinkOpen {
