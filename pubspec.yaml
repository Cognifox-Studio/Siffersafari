name: siffersafari
description: Siffersafari — an educational math game for children to practice basic arithmetic.
publish_to: 'none'

version: 1.4.1+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  
  # Animations & Graphics
  
  # Audio
  audioplayers: ^6.6.0
  
  # UI & Design
  flutter_screenutil: ^5.9.0
  
  # Utilities
  equatable: ^2.0.5
  get_it: ^9.2.1
  uuid: ^4.2.1
  bcrypt: ^1.2.0
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.1
  # Testing
  mocktail: ^1.0.1
  import_sorter: ^4.6.0
  args: ^2.7.0

flutter:
  uses-material-design: true
  
  assets:
    # Lista ljudfiler explicit så att backups (t.ex. *.wav.backup_*)
    # inte råkar packas in i APK:n.
    - assets/sounds/background_music.wav
    - assets/sounds/celebration.wav
    - assets/sounds/click.wav
    - assets/sounds/correct.wav
    - assets/sounds/wrong.wav
    # Character assets are listed per runtime folder to keep bundling explicit
    # for app + integration-test builds.
    - assets/characters/loke/png/
    - assets/characters/signe/png/
    - assets/characters/astrid/png/
    - assets/images/
    - assets/images/brand/
    - assets/images/app_icon/
    - assets/images/themes/space/
    - assets/images/themes/jungle/
    - assets/images/story/
    - assets/images/ui/
    - assets/images/items/
