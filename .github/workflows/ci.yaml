name: CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - run: flutter pub get
      - run: flutter analyze

  asset-lint:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - run: flutter pub get
      - run: python -m pip install --upgrade pip pyyaml
      - name: Run asset style lint
        run: python tools/pipeline.py lint-assets --strict --report-path artifacts/asset_lint_report.json 2>&1 | tee asset_lint.log
      - name: Upload asset lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-lint-log
          path: asset_lint.log
      - name: Upload asset lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-lint-report
          path: artifacts/asset_lint_report.json
      - name: Add asset lint summary
        if: always()
        run: |
          echo '### Asset style lint' >> $GITHUB_STEP_SUMMARY
          python - <<'PY'
          import json
          from pathlib import Path

          report = Path('artifacts/asset_lint_report.json')
          if report.exists():
              data = json.loads(report.read_text(encoding='utf-8'))
              with open(Path.home() / '.asset_lint_summary.tmp', 'w', encoding='utf-8') as f:
                  f.write(f"mode: {data.get('mode')}\n")
                  f.write(f"status: {data.get('status')}\n")
                  f.write(f"svg_files_checked: {data.get('svg_files_checked')}\n")
                  f.write(f"violations: {len(data.get('violations', []))}\n")
          PY
          if [ -f "$HOME/.asset_lint_summary.tmp" ]; then cat "$HOME/.asset_lint_summary.tmp" >> $GITHUB_STEP_SUMMARY; fi
          tail -n 40 asset_lint.log >> $GITHUB_STEP_SUMMARY || true

  core-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: asset-lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - run: flutter pub get
      - name: Run core smoke test
        run: flutter test integration_test/app_smoke_test.dart --dart-define=FULL_SMOKE=false 2>&1 | tee core_smoke.log
      - name: Upload core smoke log
        uses: actions/upload-artifact@v4
        with:
          name: core-smoke-log
          path: core_smoke.log
      - name: Add summary
        run: |
          echo '### Core smoke test körd på PR' >> $GITHUB_STEP_SUMMARY
          tail -n 20 core_smoke.log >> $GITHUB_STEP_SUMMARY

  full-smoke-and-audit:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: asset-lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - run: flutter pub get
      - name: Run full smoke test
        run: flutter test integration_test/app_smoke_test.dart --dart-define=FULL_SMOKE=true 2>&1 | tee full_smoke.log
      - name: Upload full smoke log
        uses: actions/upload-artifact@v4
        with:
          name: full-smoke-log
          path: full_smoke.log
      - name: Run audit test
        run: flutter test test/unit/audits/difficulty_mix_audit_test.dart 2>&1 | tee audit.log
      - name: Upload audit log
        uses: actions/upload-artifact@v4
        with:
          name: audit-log
          path: audit.log
      - name: Add summary
        run: |
          echo '### Full smoke och audit körda på push' >> $GITHUB_STEP_SUMMARY
          tail -n 20 full_smoke.log >> $GITHUB_STEP_SUMMARY
          tail -n 20 audit.log >> $GITHUB_STEP_SUMMARY
