<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="580" viewBox="0 0 400 580" xmlns="http://www.w3.org/2000/svg">

  <!-- ANTENNAS (drawn first so they sit behind head) -->
  <line x1="174" y1="58" x2="154" y2="15" stroke="#388E3C" stroke-width="4" stroke-linecap="round"/>
  <circle cx="154" cy="13" r="14" fill="#FF6F61" stroke="#1e1e1e" stroke-width="2.5"/>
  <line x1="226" y1="58" x2="246" y2="15" stroke="#388E3C" stroke-width="4" stroke-linecap="round"/>
  <circle cx="246" cy="13" r="14" fill="#FF6F61" stroke="#1e1e1e" stroke-width="2.5"/>

  <!-- HEAD (bigger, rounder) -->
  <ellipse cx="200" cy="133" rx="102" ry="94" fill="#F2D3A0" stroke="#1e1e1e" stroke-width="4"/>

  <!-- Cheek blushes -->
  <ellipse cx="143" cy="155" rx="27" ry="19" fill="#FFB3BA" opacity="0.5"/>
  <ellipse cx="257" cy="155" rx="27" ry="19" fill="#FFB3BA" opacity="0.5"/>

  <!-- LEFT EYE -->
  <ellipse cx="166" cy="116" rx="22" ry="25" fill="white" stroke="#1e1e1e" stroke-width="2.5"/>
  <ellipse cx="166" cy="121" rx="11" ry="14" fill="#2a2a2a"/>
  <circle cx="172" cy="112" r="5.5" fill="white" opacity="0.9"/>

  <!-- RIGHT EYE -->
  <ellipse cx="234" cy="116" rx="22" ry="25" fill="white" stroke="#1e1e1e" stroke-width="2.5"/>
  <ellipse cx="234" cy="121" rx="11" ry="14" fill="#2a2a2a"/>
  <circle cx="240" cy="112" r="5.5" fill="white" opacity="0.9"/>

  <!-- EYEBROWS -->
  <path d="M 148 90 Q 166 78 184 90" stroke="#3a2820" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M 216 90 Q 234 78 252 90" stroke="#3a2820" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- MOUTH (bigger, friendlier smile) -->
  <path d="M 166 170 Q 200 196 234 170" stroke="#2a2a2a" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- NECK -->
  <rect x="184" y="220" width="32" height="24" rx="9" fill="#F2D3A0" stroke="#1e1e1e" stroke-width="3"/>

  <!-- BODY (oval, not rectangle) -->
  <ellipse cx="200" cy="333" rx="90" ry="108" fill="#4CAF50" stroke="#1e1e1e" stroke-width="4"/>

  <!-- Belly inner highlight -->
  <ellipse cx="200" cy="317" rx="54" ry="70" fill="#66BB6A" opacity="0.48"/>

  <!-- Star on belly -->
  <polygon points="200,296 206.5,312 223.8,313 210.5,324 214.7,341 200,332 185.3,341 189.5,324 176.2,313 193.5,312" fill="white" opacity="0.72"/>

  <!-- LEFT ARM (angled outward) -->
  <g transform="translate(110,267) rotate(-22)">
    <rect x="-17" y="0" width="34" height="95" rx="13" fill="#4CAF50" stroke="#1e1e1e" stroke-width="3.5"/>
    <circle cx="0" cy="103" r="19" fill="#F2D3A0" stroke="#1e1e1e" stroke-width="3.5"/>
  </g>

  <!-- RIGHT ARM (angled outward) -->
  <g transform="translate(290,267) rotate(22)">
    <rect x="-17" y="0" width="34" height="95" rx="13" fill="#4CAF50" stroke="#1e1e1e" stroke-width="3.5"/>
    <circle cx="0" cy="103" r="19" fill="#F2D3A0" stroke="#1e1e1e" stroke-width="3.5"/>
  </g>

  <!-- LEFT LEG -->
  <rect x="150" y="432" width="44" height="98" rx="14" fill="#388E3C" stroke="#1e1e1e" stroke-width="3.5"/>
  <ellipse cx="167" cy="536" rx="37" ry="19" fill="#F2D3A0" stroke="#1e1e1e" stroke-width="3.5"/>

  <!-- RIGHT LEG -->
  <rect x="206" y="432" width="44" height="98" rx="14" fill="#388E3C" stroke="#1e1e1e" stroke-width="3.5"/>
  <ellipse cx="232" cy="536" rx="37" ry="19" fill="#F2D3A0" stroke="#1e1e1e" stroke-width="3.5"/>

  <!-- GROUND SHADOW -->
  <ellipse cx="200" cy="563" rx="72" ry="14" fill="#1a1a1a" opacity="0.16"/>

</svg>